<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculators</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f4f1;
      color: #1a1917;
    }
    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top {
      padding: 14px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e5e2de;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .title {
      margin: 0 0 10px 0;
      font-size: 20px;
      color: #2d4a3e;
    }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid #d8d3cd;
      background: #ffffff;
      color: #1a1917;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .tab-btn.active {
      background: #2d4a3e;
      color: #ffffff;
      border-color: #2d4a3e;
    }
    .panel {
      display: none;
      flex: 1;
      min-height: 0;
    }
    .panel.active {
      display: block;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1 class="title">Calculators</h1>
      <div class="tabs">
        <button class="tab-btn active" data-tab="wholesale">Wholesale</button>
        <button class="tab-btn" data-tab="manufacturing">Manufacturing</button>
      </div>
    </div>

    <div id="panel-wholesale" class="panel active">
      <iframe src="./wholesale-calculator.html" title="Wholesale calculator"></iframe>
    </div>
    <div id="panel-manufacturing" class="panel">
      <iframe src="./manufacturing-calculator.html" title="Manufacturing calculator"></iframe>
    </div>
  </div>

  <script>
    (function () {
      var buttons = document.querySelectorAll(".tab-btn");
      function openTab(tab) {
        document.querySelectorAll(".tab-btn").forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-tab") === tab);
        });
        document.getElementById("panel-wholesale").classList.toggle("active", tab === "wholesale");
        document.getElementById("panel-manufacturing").classList.toggle("active", tab === "manufacturing");
        location.hash = tab;
      }
      buttons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          openTab(btn.getAttribute("data-tab"));
        });
      });
      if (location.hash === "#manufacturing") {
        openTab("manufacturing");
      }
    })();
  </script>
</body>
</html>
